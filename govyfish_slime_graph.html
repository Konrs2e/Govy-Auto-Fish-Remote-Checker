<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<meta http-equiv='refresh' content='10'>
<title>Slime Drops</title>
<style>
body { font-family: Segoe UI, sans-serif; background: #fafafa; color: #222; margin: 24px; text-align: center; }
h2 { margin: 0 0 4px 0; }
p.sub { margin: 0 0 16px 0; color: #666; font-size: 13px; }
#wrap { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; display: inline-block; }
table { border-collapse: collapse; margin: 8px auto 0; }
th, td { border: 1px solid #ddd; padding: 4px 12px; font-size: 14px; text-align: left; }
th { background: #f0f0f0; }
</style>
</head>
<body>
<h2>Slime drops</h2>
<p class='sub'>Cumulative drops per item over time. Built: 2026-07-17 17:00:34 &nbsp;|&nbsp; <a href='govyfish_v5_graph.html'>Back to fishing page</a></p>
<div id='wrap'><canvas id='sc' width='940' height='420'></canvas>
<h2 style='margin-top:18px'>Totals</h2>
<table><tr><th>Item</th><th>Total</th></tr><tr><td style='color:#f9a825;font-weight:bold'>Titan Slime Boss Token</td><td>0</td></tr><tr><td style='color:#2e7d32;font-weight:bold'>Green Sticky Cog</td><td>0</td></tr><tr><td style='color:#1976d2;font-weight:bold'>Blue Sticky Cog</td><td>0</td></tr><tr><td style='color:#7b1fa2;font-weight:bold'>Purple Sticky Cog</td><td>0</td></tr><tr><td style='color:#e91e63;font-weight:bold'>Rainbow Cog</td><td>0</td></tr><tr><td style='color:#66bb6a;font-weight:bold'>Green Slime Ball</td><td>0</td></tr><tr><td style='color:#42a5f5;font-weight:bold'>Blue Slime Ball</td><td>0</td></tr><tr><td style='color:#ab47bc;font-weight:bold'>Purple Slime Ball</td><td>0</td></tr><tr><td style='color:#f06292;font-weight:bold'>Rainbow Slime Ball</td><td>0</td></tr></table>
</div>
<script>
var series = [['Titan Slime Boss Token','#f9a825',[]],['Green Sticky Cog','#2e7d32',[]],['Blue Sticky Cog','#1976d2',[]],['Purple Sticky Cog','#7b1fa2',[]],['Rainbow Cog','#e91e63',[]],['Green Slime Ball','#66bb6a',[]],['Blue Slime Ball','#42a5f5',[]],['Purple Slime Ball','#ab47bc',[]],['Rainbow Slime Ball','#f06292',[]]];
var cv = document.getElementById('sc');
var ctx = cv.getContext('2d');
var W = cv.width, H = cv.height;
var pL = 60, pR = 24, pT = 30, pB = 50;
var xmax = 0.1, ymax = 1;
series.forEach(function(s){
s[2].forEach(function(p){
if (p[0] > xmax) xmax = p[0];
if (p[1] > ymax) ymax = p[1];
});
});
ymax = Math.ceil(ymax * 1.1);
function X(v){ return pL + v / xmax * (W - pL - pR); }
function Y(v){ return H - pB - v / ymax * (H - pT - pB); }
ctx.font = '12px sans-serif';
ctx.strokeStyle = '#e3e3e3'; ctx.fillStyle = '#555';
for (var i = 0; i <= 5; i++) {
var v = Math.round(ymax * i / 5);
var y = Y(v);
ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(W - pR, y); ctx.stroke();
ctx.textAlign = 'right'; ctx.fillText(v, pL - 6, y + 4);
}
for (var i = 0; i <= 6; i++) {
var v = xmax * i / 6;
ctx.textAlign = 'center';
ctx.fillText(v.toFixed(2), X(v), H - pB + 16);
}
ctx.strokeStyle = '#333';
ctx.beginPath(); ctx.moveTo(pL, pT); ctx.lineTo(pL, H - pB); ctx.lineTo(W - pR, H - pB); ctx.stroke();
var lx = pL + 8;
series.forEach(function(s){
var pts = s[2];
ctx.strokeStyle = s[1]; ctx.lineWidth = 2;
if (pts.length > 0) {
ctx.beginPath();
ctx.moveTo(X(0), Y(0));
var lastY = 0;
pts.forEach(function(p){
ctx.lineTo(X(p[0]), Y(lastY));
ctx.lineTo(X(p[0]), Y(p[1]));
lastY = p[1];
});
ctx.lineTo(X(xmax), Y(lastY));
ctx.stroke();
}
ctx.fillStyle = s[1]; ctx.fillRect(lx, pT - 16, 12, 3);
ctx.fillStyle = '#333'; ctx.textAlign = 'left'; ctx.fillText(s[0], lx + 16, pT - 10);
lx += ctx.measureText(s[0]).width + 44;
});
ctx.fillStyle = '#333'; ctx.textAlign = 'center'; ctx.font = '13px sans-serif';
ctx.fillText('Hours since first drop', pL + (W - pL - pR) / 2, H - 10);
</script>
</body>
</html>
